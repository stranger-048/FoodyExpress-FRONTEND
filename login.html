<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodie | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <header class="site-header">
    <nav class="navbar container">
      <a class="brand" href="index.html">Foodie</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="login.html">Login</a>
        <a class="btn btn-small" href="register.html">Register</a>
      </div>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <p class="eyebrow">Welcome back</p>
      <h1>Login</h1>
      <p class="muted">Enter your account details to continue.</p>

      <div class="message hidden" id="loginMessage" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
          <small class="field-error" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <small class="field-error" id="passwordError"></small>
        </div>

        <div class="form-group">
          <label for="role">Login As</label>
          <select id="role" name="role" required>
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button class="btn btn-block" id="loginButton" type="submit">Login</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Create Customer Account</a></p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
