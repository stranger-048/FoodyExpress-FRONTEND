<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Foodie Admin | Food Items</title><link rel="stylesheet" href="../css/style.css"></head><body><header class="admin-header"><div class="admin-nav container"><a class="brand" href="dashboard.html">Foodie Admin</a><nav><a href="dashboard.html">Dashboard</a><a href="restaurants.html">Restaurants</a><a href="categories.html">Categories</a><a href="items.html">Food Items</a><a href="orders.html">Orders</a><button class="nav-button" id="logoutButton">Logout</button></nav></div></header><main><section class="page-hero"><div class="container"><p class="eyebrow">Administration</p><h1>Food Items</h1><p>Manage item names, categories, prices, and stock quantities.</p></div></section><section class="section container"><div class="admin-page-head"><input id="itemSearch" type="search" placeholder="Search food items..."><button class="btn" id="addItemButton">+ Add Food Item</button></div><div class="message hidden" id="itemMessage"></div><div class="loading-state" id="itemLoading"><div class="spinner"></div><p>Loading food items...</p></div><div class="admin-table-wrap hidden" id="itemTableWrap"><table class="admin-table"><thead><tr><th>Food Item</th><th>Category</th><th>Price</th><th>Quantity</th><th>Actions</th></tr></thead><tbody id="itemRows"></tbody></table></div></section></main><div class="modal hidden" id="itemModal"><div class="modal-card modal-small"><div class="modal-head"><div><p class="eyebrow">Food item form</p><h2 id="itemModalTitle">Add Food Item</h2></div><button class="modal-close" id="closeItemModal">×</button></div><form id="itemForm"><div class="form-group"><label>Item Name</label><input id="itemName" required></div><div class="form-group"><label>Category</label><select id="itemCategory" required></select></div><div class="form-group">
    <label>Quantity</label>

    <input
        id="itemQuantity"
        type="number"
        min="0"
        step="1"
        required
    >
</div><div class="form-group"><label>Cost</label><input id="itemCost" type="number" min="0" step="0.01" required></div><button class="btn btn-block" id="saveItemButton">Save Food Item</button></form></div></div><div class="toast hidden" id="adminToast"></div><script src="../js/api.js"></script><script src="js/admin-common.js"></script><script src="js/admin-items.js"></script></body></html>
