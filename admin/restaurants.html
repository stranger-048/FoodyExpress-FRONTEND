<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Foodie Admin | Restaurants</title><link rel="stylesheet" href="../css/style.css"></head><body><header class="admin-header"><div class="admin-nav container"><a class="brand" href="dashboard.html">Foodie Admin</a><nav><a href="dashboard.html">Dashboard</a><a href="restaurants.html">Restaurants</a><a href="categories.html">Categories</a><a href="items.html">Food Items</a><a href="orders.html">Orders</a><button class="nav-button" id="logoutButton">Logout</button></nav></div></header><main><section class="page-hero"><div class="container"><p class="eyebrow">Administration</p><h1>Restaurants</h1><p>Add, edit, and remove restaurants. Generated IDs remain internal.</p></div></section><section class="section container"><div class="admin-page-head"><input id="restaurantSearch" type="search" placeholder="Search restaurants..."><button class="btn" id="addRestaurantButton">+ Add Restaurant</button></div><div class="message hidden" id="restaurantMessage"></div><div class="loading-state" id="restaurantLoading"><div class="spinner"></div><p>Loading restaurants...</p></div><div class="admin-table-wrap hidden" id="tableWrap"><table class="admin-table"><thead><tr><th>Restaurant</th><th>Manager</th><th>City</th><th>Contact</th><th>Actions</th></tr></thead><tbody id="restaurantRows"></tbody></table></div></section></main>
<div class="modal hidden" id="restaurantModal"><div class="modal-card"><div class="modal-head"><div><p class="eyebrow">Restaurant form</p><h2 id="modalTitle">Add Restaurant</h2></div><button class="modal-close" id="closeModal">×</button></div><form id="restaurantForm"><div class="form-grid">
<div class="form-group"><label>Restaurant Name</label><input id="restaurantName" required></div><div class="form-group"><label>Manager Name</label><input id="managerName" required></div><div class="form-group"><label>Contact Number</label><input id="contactNumber" maxlength="10" required></div><div class="form-group"><label>Street No.</label><input id="streetNo" required></div><div class="form-group"><label>Building Name</label><input id="buildingName" required></div><div class="form-group"><label>Area</label><input id="area" required></div><div class="form-group"><label>City</label><input id="city" required></div><div class="form-group"><label>State</label><input id="state" required></div><div class="form-group"><label>Pincode</label><input id="pincode" required></div><div class="form-group"><label>Country</label><input id="country" value="India" required></div></div><button class="btn btn-block" id="saveRestaurantButton">Save Restaurant</button></form></div></div>
<div class="toast hidden" id="adminToast"></div><script src="../js/api.js"></script><script src="js/admin-common.js"></script><script src="js/admin-restaurants.js"></script></body></html>
